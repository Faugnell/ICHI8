services:
  postgres:
    image: postgres:16-alpine
    container_name: ichi8-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ichi8}
      POSTGRES_USER: ${POSTGRES_USER:-ichi8}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ichi8_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ichi8} -d ${POSTGRES_DB:-ichi8}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./apps/server
    container_name: ichi8-server
    restart: unless-stopped
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://ichi8:ichi8_dev_password@postgres:5432/ichi8}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
